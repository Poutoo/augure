name: CI

on:
  push:
    branches: [main, thibault.dev]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend ────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — TypeScript + Lint + Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://auth-augure-production.up.railway.app/api/v1

  # ── Backend ─────────────────────────────────────────────────────────────────
  backend:
    name: Backend — Lint + Syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt ruff

      - name: Lint (ruff)
        run: ruff check app/

      - name: Syntax check
        run: python -m compileall app/
